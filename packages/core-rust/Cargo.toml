[workspace]
resolver = "2"
members = [
    "kalam-core",
    "kalam-ffi",
    "kalam-wasm",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "Proprietary"
authors = ["Ikigai Intl"]

[workspace.dependencies]
# Crypto
openmls = "0.6"
openmls_rust_crypto = "0.2"
x25519-dalek = "2.0"
ed25519-dalek = "2.1"
aes-gcm = "0.10"
sha2 = "0.10"
hkdf = "0.12"
rand = "0.8"
zeroize = { version = "1.8", features = ["derive"] }

# Storage
rusqlite = { version = "0.32", features = ["bundled-sqlcipher"] }

# Transport
# waku-rust will be added when stable bindings are available
tokio = { version = "1.40", features = ["full"] }

# Serialization
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# FFI
uniffi = "0.28"

# Ethereum
ethers = "2.0"

# Error handling
thiserror = "2.0"
anyhow = "1.0"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"
